# WE-01-DUALMODE / Tool API UX — unit tests (e.g. context variable path helpers)
name: UI — Vitest

on:
  push:
    paths:
      - "ui/**"
      - "catalog/fixtures/**"
      - "catalog/scripts/validate-n8n-workflow-export.mjs"
      - ".github/workflows/ui-vitest.yml"
  pull_request:
    paths:
      - "ui/**"
      - "catalog/fixtures/**"
      - "catalog/scripts/validate-n8n-workflow-export.mjs"
      - ".github/workflows/ui-vitest.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm test
