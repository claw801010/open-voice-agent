# MK-01-IMPORT-OPTIONS — n8n export structural check + HTTP hints (no importer code)
name: Catalog — n8n export validate

on:
  push:
    paths:
      - "catalog/fixtures/**"
      - "catalog/scripts/validate-n8n-workflow-export.mjs"
      - ".github/workflows/catalog-n8n-validate.yml"
  pull_request:
    paths:
      - "catalog/fixtures/**"
      - "catalog/scripts/validate-n8n-workflow-export.mjs"
      - ".github/workflows/catalog-n8n-validate.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-n8n-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Structural validate + HTTP hints
        run: |
          node catalog/scripts/validate-n8n-workflow-export.mjs catalog/fixtures/n8n-minimal-http-request.json
          node catalog/scripts/validate-n8n-workflow-export.mjs --http-hints catalog/fixtures/n8n-minimal-http-request.json
