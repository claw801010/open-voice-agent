# WE-01-ORG-USAGE — integration tests for org/workflow daily + weekly usage rollups.
name: API — usage rollup tests

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/api-pytest-usage-rollup.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-pytest-usage-rollup.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-usage-rollup:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements.dev.txt

      - name: Run usage rollup tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/postgres
          REDIS_URL: redis://127.0.0.1:6379/0
          LOG_LEVEL: WARNING
        run: python -m pytest tests/test_usage_daily_rollup_routes.py -q --tb=short
